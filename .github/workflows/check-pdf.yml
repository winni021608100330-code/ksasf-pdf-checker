name: KSASF PDF Checker

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ksasf-pdf-checker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Sync latest state
        run: git pull --rebase origin "$GITHUB_REF_NAME"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check KSASF PDF
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python checker.py

      - name: Save state.json
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- data/state.json; then
            echo "state.json has not changed."
            exit 0
          fi

          CONTENT="$(base64 -w 0 data/state.json)"

          for attempt in 1 2 3; do
            echo "Save attempt $attempt/3"

            SHA="$(gh api -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "repos/$GITHUB_REPOSITORY/contents/data/state.json?ref=$GITHUB_REF_NAME" --jq '.sha')"

            if gh api --method PUT -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "repos/$GITHUB_REPOSITORY/contents/data/state.json" -f message="Update KSASF PDF state" -f content="$CONTENT" -f branch="$GITHUB_REF_NAME" -f sha="$SHA"; then
              echo "state.json saved successfully."
              exit 0
            fi

            echo "State save conflict. Retrying after 5 seconds."
            sleep 5
          done

          echo "Failed to save state.json after 3 attempts."
          exit 1
