name: KSASF PDF Checker

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ksasf-pdf-checker-state
  cancel-in-progress: false

jobs:
  check-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check KSASF PDFs
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python checker.py

      - name: Upload downloaded PDFs
        uses: actions/upload-artifact@v4
        with:
          name: ksasf-pdfs-${{ github.run_number }}
          path: data/pdfs/*.pdf
          if-no-files-found: ignore
          retention-days: 30

      - name: Save processed PDF state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Update processed KSASF PDF state"
            for attempt in 1 2 3; do
              git pull --rebase origin "$GITHUB_REF_NAME"
              if git push origin "HEAD:$GITHUB_REF_NAME"; then
                exit 0
              fi
              echo "Push failed. Retry $attempt/3 after 5 seconds."
              sleep 5
            done
            exit 1
          fi
