name: KSASF PDF Checker

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ksasf-pdf-checker-state
  cancel-in-progress: false

jobs:
  check-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check KSASF PDF
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python checker.py

      - name: Save state.json
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- data/state.json; then
            echo "state.json has not changed."
            exit 0
          fi

          cp data/state.json "$RUNNER_TEMP/state.json"
          git restore data/state.json
          git pull --rebase origin "$GITHUB_REF_NAME"
          cp "$RUNNER_TEMP/state.json" data/state.json

          git add data/state.json
          if git diff --cached --quiet; then
            echo "No state changes remain after rebase."
            exit 0
          fi

          git commit -m "Update KSASF PDF state"

          for attempt in 1 2 3; do
            echo "Push attempt $attempt/3"

            if git pull --rebase origin "$GITHUB_REF_NAME"; then
              if git push origin "HEAD:$GITHUB_REF_NAME"; then
                echo "state.json saved successfully."
                exit 0
              fi
            else
              git rebase --abort || true
            fi

            sleep 5
          done

          echo "Failed to save state.json after 3 attempts."
          exit 1
